<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seven8 — Apprends à danser</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #0a0a0a;
    --bg2:   #141414;
    --bg3:   #1e1e1e;
    --bg4:   #282828;
    --fg:    #f2f0eb;
    --fg2:   #888880;
    --fg3:   #555550;
    --border:#2a2a2a;
    --gold:  #c9a84c;
    --ok:    #3eb489;
    --err:   #d95f5f;
    --afro:  #e8a020;
    --lock:  #e84545;
    --bach:  #9b59b6;
    --r: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; animation: fadeIn .3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); letter-spacing: .04em; }
  .topbar .logo-img { height: 48px; width: auto; object-fit: contain; }
  .topbar .back-btn {
    background: none; border: 1px solid var(--border);
    color: var(--fg2); font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: all .2s;
  }
  .topbar .back-btn:hover { border-color: var(--gold); color: var(--gold); }
  .topbar .breadcrumb { color: var(--fg3); font-size: 13px; margin-left: auto; }

  /* ── SCROLLABLE CONTENT ── */
  .content { flex: 1; overflow-y: auto; padding: 32px 28px; max-width: 900px; margin: 0 auto; width: 100%; }

  /* ── ACCUEIL ── */
  .hero {
    text-align: center;
    padding: 80px 20px 52px;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,.12), transparent);
    pointer-events: none;
  } to { transform: scale(1); opacity:1; } }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(72px, 12vw, 130px);
    font-weight: 900;
    color: #c9a84c;
    letter-spacing: -.03em;
    line-height: 1;
    text-shadow: 0 2px 40px rgba(201,168,76,.18);
  }
  .hero-sub {
    margin-top: 18px;
    color: #8a8a8a;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .28em;
    text-transform: uppercase;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--fg3);
    margin-bottom: 16px;
    padding-left: 2px;
  }

  /* ── STYLE CARDS ── */
  .style-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 8px; }
  .style-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 24px;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative; overflow: hidden;
  }
  .style-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--c);
    opacity: .8;
  }
  .style-card:hover { transform: translateY(-3px); border-color: var(--c); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .style-card .emoji { font-size: 36px; margin-bottom: 12px; display: block; }
  .style-card h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--c); margin-bottom: 6px; }
  .style-card p { color: var(--fg2); font-size: 13px; line-height: 1.5; }
  .style-card .prog-bar { margin-top: 16px; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .style-card .prog-fill { height: 100%; background: var(--c); border-radius: 2px; transition: width .6s ease; }
  .style-card .prog-label { margin-top: 6px; font-size: 11px; color: var(--fg3); }

  /* ── PAS LIST ── */
  .style-header {
    padding: 36px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .style-header .style-emoji { font-size: 48px; margin-bottom: 8px; display: block; }
  .style-header h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--c); }
  .style-header p { color: var(--fg2); margin-top: 6px; max-width: 560px; }

  .pas-list { display: flex; flex-direction: column; gap: 12px; }
  .pas-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 20px;
    transition: border-color .2s;
  }
  .pas-card.unlocked { cursor: pointer; }
  .pas-card.unlocked:hover { border-color: var(--c); }
  .pas-card.locked { opacity: .45; }
  .pas-badge {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--bg4); display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0; font-family: 'Playfair Display', serif; font-weight: 700;
  }
  .pas-badge.done { background: var(--ok); color: #fff; }
  .pas-badge.active { background: var(--c); color: #fff; }
  .pas-info { flex: 1; }
  .pas-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .pas-info p { font-size: 13px; color: var(--fg2); }
  .pas-info .best { font-size: 12px; color: var(--gold); margin-top: 4px; }
  .btn-start {
    padding: 10px 22px; border-radius: 6px; border: none;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer; transition: all .2s; background: var(--c); color: #fff; flex-shrink: 0;
  }
  .btn-start.done { background: var(--ok); }
  .btn-start:hover { filter: brightness(1.15); transform: scale(1.03); }

  /* ── DETAIL PAS ── */
  .pas-hero {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .pas-hero .niveau-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    background: color-mix(in srgb, var(--c) 20%, transparent);
    color: var(--c); font-size: 12px; font-weight: 600; margin-bottom: 12px;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .pas-hero h1 { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 8px; }
  .pas-hero p { color: var(--fg2); max-width: 600px; }

  .video-zone {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 0; overflow: hidden; margin-bottom: 28px;
    aspect-ratio: 16/7; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .video-zone video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .video-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 40px;
  }
  .video-placeholder .big-icon { font-size: 52px; opacity: .4; }
  .video-placeholder p { color: var(--fg3); font-size: 13px; text-align: center; max-width: 300px; }
  .video-placeholder input[type=file] { display: none; }
  .btn-upload {
    padding: 10px 22px; background: var(--bg4); border: 1px solid var(--border);
    color: var(--fg2); border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; transition: all .2s;
  }
  .btn-upload:hover { border-color: var(--c); color: var(--c); }

  .carac-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
  .carac-list li {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--bg2); border-radius: 8px; padding: 14px 18px;
    border-left: 3px solid var(--c);
  }
  .carac-list li .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c); margin-top: 7px; flex-shrink: 0; }

  .quiz-cta {
    background: color-mix(in srgb, var(--c) 10%, var(--bg2));
    border: 1px solid color-mix(in srgb, var(--c) 30%, transparent);
    border-radius: var(--r); padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    flex-wrap: wrap;
  }
  .quiz-cta p { color: var(--fg2); font-size: 14px; }
  .quiz-cta strong { display: block; font-size: 18px; color: var(--fg); font-weight: 600; margin-bottom: 4px; }
  .btn-quiz {
    padding: 14px 32px; background: var(--c); color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px;
    transition: all .2s; white-space: nowrap;
  }
  .btn-quiz:hover { filter: brightness(1.15); transform: scale(1.03); }

  /* ── QUIZ ── */
  .quiz-header { padding: 28px 0 20px; }
  .quiz-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 4px; }
  .quiz-header .meta { color: var(--fg3); font-size: 13px; }

  .quiz-progress-bar { height: 6px; background: var(--bg4); border-radius: 3px; margin-bottom: 32px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--c); border-radius: 3px; transition: width .4s ease; }

  .quiz-q-number { font-size: 12px; color: var(--fg3); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px; }
  .quiz-question {
    font-family: 'Playfair Display', serif; font-size: clamp(20px, 3vw, 26px);
    line-height: 1.4; margin-bottom: 32px; color: var(--fg);
  }
  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .choice-btn {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--fg); font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 16px 22px; border-radius: 8px; cursor: pointer;
    text-align: left; transition: all .15s; display: flex; align-items: center; gap: 14px;
  }
  .choice-btn .choice-letter {
    width: 28px; height: 28px; border-radius: 50%; background: var(--bg4);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; color: var(--fg2);
    transition: all .15s;
  }
  .choice-btn:not(.answered):hover { border-color: var(--c); background: color-mix(in srgb, var(--c) 8%, var(--bg2)); }
  .choice-btn:not(.answered):hover .choice-letter { background: var(--c); color: #fff; }
  .choice-btn.selected { border-color: var(--c); background: color-mix(in srgb, var(--c) 12%, var(--bg2)); }
  .choice-btn.selected .choice-letter { background: var(--c); color: #fff; }
  .choice-btn.correct { border-color: var(--ok); background: color-mix(in srgb, var(--ok) 12%, var(--bg2)); pointer-events: none; }
  .choice-btn.correct .choice-letter { background: var(--ok); color: #fff; }
  .choice-btn.wrong { border-color: var(--err); background: color-mix(in srgb, var(--err) 10%, var(--bg2)); pointer-events: none; }
  .choice-btn.wrong .choice-letter { background: var(--err); color: #fff; }
  .choice-btn.disabled { pointer-events: none; opacity: .5; }

  .feedback-bar {
    padding: 14px 20px; border-radius: 8px; margin-bottom: 20px;
    font-weight: 600; font-size: 14px; display: none;
  }
  .feedback-bar.ok { background: color-mix(in srgb, var(--ok) 15%, var(--bg2)); color: var(--ok); border-left: 3px solid var(--ok); display: block; }
  .feedback-bar.ko { background: color-mix(in srgb, var(--err) 12%, var(--bg2)); color: var(--err); border-left: 3px solid var(--err); display: block; }

  .btn-next {
    padding: 14px 36px; background: var(--c); color: #fff;
    border: none; border-radius: 8px; cursor: pointer; width: 100%;
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 15px;
    transition: all .2s; display: none;
  }
  .btn-next.visible { display: block; }
  .btn-next:hover { filter: brightness(1.15); }

  /* ── RESULTAT ── */
  .resultat-screen {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; flex-direction: column; text-align: center;
  }
  .result-icon { font-size: 72px; margin-bottom: 16px; animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes popIn { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
  .result-title { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 8px; }
  .result-pas { font-size: 16px; color: var(--fg2); margin-bottom: 28px; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: var(--bg2); border: 3px solid var(--c);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 28px; position: relative;
  }
  .score-circle .pct { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 900; color: var(--c); line-height: 1; }
  .score-circle .pct-label { font-size: 12px; color: var(--fg3); letter-spacing: .1em; }
  .result-msg { color: var(--fg2); max-width: 400px; margin: 0 auto 32px; line-height: 1.6; }
  .result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-outline {
    padding: 12px 24px; background: none; border: 1px solid var(--border);
    color: var(--fg2); border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px;
    transition: all .2s;
  }
  .btn-outline:hover { border-color: var(--fg2); color: var(--fg); }

  /* ── MISC ── */
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 16px; }

  @media (max-width: 600px) {
    .content { padding: 20px 16px; }
    .quiz-cta { flex-direction: column; }
    .style-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ════════════════════════════════════════════════
//  ÉTAT & PROGRESSION (localStorage)
// ════════════════════════════════════════════════
function loadProgress() {
  try {
    const saved = localStorage.getItem('seven8_progress');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return buildDefaultProgress();
}

function buildDefaultProgress() {
  const p = {};
  for (const [sid, style] of Object.entries(STYLES)) {
    p[sid] = {};
    style.pas.forEach((pas, i) => {
      p[sid][pas.id] = { debloque: i === 0, valide: false, meilleurScore: 0, tentatives: 0 };
    });
  }
  return p;
}

function saveProgress() {
  localStorage.setItem('seven8_progress', JSON.stringify(progress));
}

function validerPas(styleId, pasId, score) {
  const pp = progress[styleId][pasId];
  pp.tentatives++;
  if (score > pp.meilleurScore) pp.meilleurScore = score;
  const reussi = score >= 70;
  if (reussi && !pp.valide) {
    pp.valide = true;
    debloquerSuivant(styleId, pasId);
  }
  saveProgress();
  return reussi;
}

function debloquerSuivant(styleId, pasId) {
  const pasList = STYLES[styleId].pas;
  const idx = pasList.findIndex(p => p.id === pasId);
  if (idx >= 0 && idx + 1 < pasList.length) {
    progress[styleId][pasList[idx+1].id].debloque = true;
  }
}

function getStats(styleId) {
  const data = progress[styleId];
  const total = Object.keys(data).length;
  const valides = Object.values(data).filter(p => p.valide).length;
  return { valides, total };
}

let progress = loadProgress();

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
let currentStyle = null, currentPasIdx = 0;
let quizQuestions = [], quizIdx = 0, quizScore = 0, quizAnswered = false;
let videoFiles = {}; // stocke les vidéos chargées

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.scrollTop = 0;
  if (el.querySelector('.content')) el.querySelector('.content').scrollTop = 0;
}

function setCSSColor(color) {
  document.querySelectorAll('.screen.active, .screen').forEach(el => {
    el.style.setProperty('--c', color);
  });
  document.body.style.setProperty('--c', color);
}

// ── ACCUEIL ──
function showAccueil() {
  progress = loadProgress();
  setCSSColor('var(--gold)');

  // Stats globales
  let totalV = 0, totalT = 0;
  for (const sid of Object.keys(STYLES)) {
    const s = getStats(sid);
    totalV += s.valides; totalT += s.total;
  }
  document.getElementById('accueil-stats').textContent = `${totalV} / ${totalT} pas validés`;

  // Cartes
  const grid = document.getElementById('style-grid');
  grid.innerHTML = '';
  for (const [sid, style] of Object.entries(STYLES)) {
    const { valides, total } = getStats(sid);
    const pct = total > 0 ? Math.round(valides / total * 100) : 0;
    const card = document.createElement('div');
    card.className = 'style-card';
    card.style.setProperty('--c', style.color);
    card.innerHTML = `
      <span class="emoji">${style.emoji}</span>
      <h2>${style.nom}</h2>
      <p>${style.description}</p>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-label">${valides} / ${total} pas validés</div>
    `;
    card.onclick = () => showStyle(sid);
    grid.appendChild(card);
  }
  showScreen('screen-accueil');
}

// ── STYLE ──
function showStyle(styleId) {
  currentStyle = styleId;
  const style = STYLES[styleId];
  setCSSColor(style.color);

  document.getElementById('style-breadcrumb').textContent = style.nom;
  document.getElementById('style-emoji').textContent = style.emoji;
  document.getElementById('style-title').textContent = style.nom;
  document.getElementById('style-desc').textContent = style.description;
  document.getElementById('screen-style').style.setProperty('--c', style.color);

  const list = document.getElementById('pas-list');
  list.innerHTML = '';

  style.pas.forEach((pas, i) => {
    const pp = progress[styleId][pas.id];
    const unlocked = pp.debloque;
    const done = pp.valide;

    const card = document.createElement('div');
    card.className = `pas-card ${unlocked ? 'unlocked' : 'locked'}`;
    card.style.setProperty('--c', style.color);

    const badgeClass = done ? 'done' : (unlocked ? 'active' : '');
    const badgeContent = done ? '✓' : (unlocked ? pas.niveau : '🔒');

    card.innerHTML = `
      <div class="pas-badge ${badgeClass}">${badgeContent}</div>
      <div class="pas-info">
        <h3>${pas.nom}</h3>
        <p>${pas.description}</p>
        ${pp.meilleurScore > 0 ? `<div class="best">⭐ Meilleur score : ${pp.meilleurScore}%</div>` : ''}
      </div>
      ${unlocked ? `<button class="btn-start ${done ? 'done' : ''}" style="--c:${style.color}">${done ? '🔄 Réviser' : '▶ Commencer'}</button>` : '<span style="color:var(--fg3);font-size:13px">Verrouillé</span>'}
    `;

    if (unlocked) {
      card.onclick = () => showPas(styleId, i);
    }
    list.appendChild(card);
  });

  showScreen('screen-style');
}

// ── PAS DETAIL ──
function showPas(styleId, pasIdx) {
  currentStyle = styleId;
  currentPasIdx = pasIdx;
  const style = STYLES[styleId];
  const pas = style.pas[pasIdx];
  const color = style.color;

  setCSSColor(color);
  document.getElementById('screen-pas').style.setProperty('--c', color);
  document.getElementById('btn-back-style').textContent = `← ${style.nom}`;
  document.getElementById('btn-back-style').onclick = () => showStyle(styleId);
  document.getElementById('pas-breadcrumb').textContent = `${style.nom} → ${pas.nom}`;
  document.getElementById('pas-niveau-badge').textContent = `Niveau ${pas.niveau}`;
  document.getElementById('pas-niveau-badge').style.setProperty('--c', color);
  document.getElementById('pas-title').textContent = pas.nom;
  document.getElementById('pas-desc').textContent = pas.description;

  // Vidéo
  const zone = document.getElementById('video-zone');
  const placeholder = document.getElementById('video-placeholder');
  zone.innerHTML = '';

  if (videoFiles[pas.id]) {
    const vid = document.createElement('video');
    vid.src = videoFiles[pas.id];
    vid.controls = true;
    vid.style.width = '100%';
    zone.appendChild(vid);
  } else {
    const ph = document.createElement('div');
    ph.className = 'video-placeholder';
    ph.innerHTML = `
      <span class="big-icon">🎬</span>
      <p>Ajoute une vidéo pour ce pas</p>
      <label class="btn-upload" style="--c:${color}">
        📁 Choisir un fichier vidéo
        <input type="file" accept="video/*" style="display:none" id="vfile-${pas.id}">
      </label>
    `;
    zone.appendChild(ph);
    const inp = ph.querySelector('input');
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      videoFiles[pas.id] = URL.createObjectURL(file);
      showPas(styleId, pasIdx);
    };
  }

  // Caractéristiques
  const ul = document.getElementById('carac-list');
  ul.innerHTML = '';
  pas.caracteristiques.forEach(c => {
    const li = document.createElement('li');
    li.style.borderLeftColor = color;
    li.innerHTML = `<span class="dot" style="background:${color}"></span><span>${c}</span>`;
    ul.appendChild(li);
  });

  // CTA Quiz
  const pp = progress[styleId][pas.id];
  const nq = pas.questions.length;
  document.getElementById('quiz-cta').style.setProperty('--c', color);
  document.getElementById('quiz-cta-title').textContent = pp.valide
    ? `✓ Pas validé — Révise quand tu veux`
    : `Prêt(e) à valider ce pas ?`;
  document.getElementById('quiz-cta-desc').textContent = `${nq} questions • Score minimum : 70%`;
  document.getElementById('btn-start-quiz').style.background = color;
  document.getElementById('btn-start-quiz').onclick = () => showQuiz(styleId, pasIdx);

  showScreen('screen-pas');
}

// ── QUIZ ──
function showQuiz(styleId, pasIdx) {
  currentStyle = styleId;
  currentPasIdx = pasIdx;
  const style = STYLES[styleId];
  const pas = style.pas[pasIdx];
  const color = style.color;

  setCSSColor(color);
  document.getElementById('screen-quiz').style.setProperty('--c', color);
  document.getElementById('btn-back-pas').onclick = () => showPas(styleId, pasIdx);
  document.getElementById('quiz-title').textContent = pas.nom;
  document.getElementById('quiz-breadcrumb').textContent = `Quiz`;

  // Mélanger les questions
  quizQuestions = [...pas.questions].sort(() => Math.random() - 0.5);
  quizIdx = 0;
  quizScore = 0;

  document.getElementById('quiz-prog').style.setProperty('--c', color);
  document.getElementById('btn-next').style.background = color;

  renderQuestion();
  showScreen('screen-quiz');
}

function renderQuestion() {
  const q = quizQuestions[quizIdx];
  const total = quizQuestions.length;
  quizAnswered = false;

  document.getElementById('quiz-meta').textContent = `${currentStyle.charAt(0).toUpperCase() + currentStyle.slice(1)} • ${STYLES[currentStyle].pas[currentPasIdx].nom}`;
  document.getElementById('q-number').textContent = `Question ${quizIdx + 1} sur ${total}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('quiz-prog').style.width = `${(quizIdx / total) * 100}%`;
  document.getElementById('feedback').className = 'feedback-bar';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btn-next').classList.remove('visible');

  const letters = ['A','B','C','D'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.c.forEach((choix, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${choix}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const correct = q.r;
  const letters = ['A','B','C','D'];
  const btns = document.querySelectorAll('.choice-btn');

  btns.forEach((btn, i) => {
    btn.classList.add('answered');
    if (i === correct) {
      btn.classList.add('correct');
      btn.querySelector('.choice-letter').textContent = '✓';
    } else if (i === idx && idx !== correct) {
      btn.classList.add('wrong');
      btn.querySelector('.choice-letter').textContent = '✗';
    } else {
      btn.classList.add('disabled');
    }
  });

  const fb = document.getElementById('feedback');
  if (idx === correct) {
    quizScore++;
    fb.className = 'feedback-bar ok';
    fb.textContent = '✓ Bonne réponse !';
  } else {
    fb.className = 'feedback-bar ko';
    fb.textContent = `✗ La bonne réponse était : ${q.c[correct]}`;
  }

  const btnNext = document.getElementById('btn-next');
  btnNext.classList.add('visible');
  const isLast = quizIdx + 1 >= quizQuestions.length;
  btnNext.textContent = isLast ? 'Voir les résultats →' : 'Continuer →';
  btnNext.onclick = isLast ? finishQuiz : nextQuestion;
}

function nextQuestion() {
  quizIdx++;
  renderQuestion();
}

function finishQuiz() {
  const total = quizQuestions.length;
  const pct = Math.round(quizScore / total * 100);
  const pas = STYLES[currentStyle].pas[currentPasIdx];
  const reussi = validerPas(currentStyle, pas.id, pct);
  showResultat(pct, reussi);
}

// ── RESULTAT ──
function showResultat(score, reussi) {
  const style = STYLES[currentStyle];
  const pas = style.pas[currentPasIdx];
  const color = style.color;

  setCSSColor(color);
  document.getElementById('screen-resultat').style.setProperty('--c', color);

  document.getElementById('result-icon').textContent = reussi ? '🏆' : '💪';
  document.getElementById('result-title').textContent = reussi ? 'Pas validé !' : 'Presque !';
  document.getElementById('result-title').style.color = reussi ? 'var(--ok)' : 'var(--gold)';
  document.getElementById('result-pas').textContent = `${style.emoji} ${pas.nom}`;
  document.getElementById('result-pct').textContent = `${score}%`;
  document.querySelector('.score-circle').style.borderColor = reussi ? 'var(--ok)' : color;
  document.getElementById('result-pct').style.color = reussi ? 'var(--ok)' : color;
  document.getElementById('result-msg').textContent = reussi
    ? '🎉 Excellent ! Le pas suivant est maintenant débloqué. Continue comme ça !'
    : `Tu as besoin de 70% pour valider. Encore un effort — tu peux le faire !`;

  document.getElementById('btn-retry').onclick = () => showQuiz(currentStyle, currentPasIdx);
  document.getElementById('btn-back-to-style').style.background = color;
  document.getElementById('btn-back-to-style').textContent = `← ${style.nom}`;
  document.getElementById('btn-back-to-style').onclick = () => showStyle(currentStyle);

  showScreen('screen-resultat');
}

// ── INIT ──
showAccueil();
